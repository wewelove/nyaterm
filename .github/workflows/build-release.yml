name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'ubuntu-24.04-arm'
            args: ''
            target: 'aarch64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: '--bundles nsis'
            target: 'x86_64-pc-windows-msvc'
          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc --bundles nsis'
            target: 'aarch64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./cli -> target
          # 为不同的编译目标使用不同的缓存（不包含 commit hash）
          key: ${{ matrix.platform }}-${{ matrix.target }}
          # 编译失败时不保存损坏的缓存
          cache-on-failure: false
        env:
          RUST_CACHE_COMPRESS: true

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential \
            curl \
            wget \
            file \
            xdg-utils

          if [ "${{ matrix.platform }}" = "ubuntu-24.04-arm" ]; then
            # AppImage tools still need FUSE 2 runtime on Ubuntu 24.04; the package was renamed from libfuse2.
            sudo apt-get install -y libfuse2t64
          fi

      - name: Cleanup Old Caches
        uses: actions/github-script@v8
        with:
          script: |
            // Delete actions caches older than 90 days to avoid stale/large caches
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const threshold = Date.now() - (90 * 24 * 60 * 60 * 1000); // 90 days
            for (const cache of caches.data.actions_caches || []) {
              const created = new Date(cache.created_at).getTime();
              if (created < threshold) {
                console.log(`Deleting cache: ${cache.key} (created: ${cache.created_at})`);
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                });
              }
            }

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Try manual changelog first (exit 2 = no changelog found)
          NOTES=$(pnpm --silent release:notes "$VERSION" --stdout 2>/dev/null) && HAS_CHANGELOG=true || HAS_CHANGELOG=false

          if [ "$HAS_CHANGELOG" = "false" ]; then
            # Fall back to GitHub auto-generated release notes (based on .github/release.yml + PR history)
            PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p' || echo "")
            if [ -n "$PREV_TAG" ]; then
              AUTO_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
                -f tag_name="${GITHUB_REF_NAME}" \
                -f previous_tag_name="$PREV_TAG" \
                --jq '.body' 2>/dev/null || echo "")
            else
              AUTO_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
                -f tag_name="${GITHUB_REF_NAME}" \
                --jq '.body' 2>/dev/null || echo "")
            fi

            # Combine: auto-generated notes + install tips from script
            INSTALL_TIPS=$(echo "$NOTES")
            if [ -n "$AUTO_NOTES" ]; then
              NOTES="${AUTO_NOTES}

          ${INSTALL_TIPS}"
            fi
          fi

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build CLI companion
        shell: bash
        run: |
          set -euo pipefail
          cd cli
          cargo build --release --target ${{ matrix.target }}
          mkdir -p ../src-tauri/cli-bin
          if [[ "${{ matrix.platform }}" == *"windows"* ]]; then
            cp "target/${{ matrix.target }}/release/oxt.exe" ../src-tauri/cli-bin/oxt.exe
          else
            cp "target/${{ matrix.target }}/release/oxt" ../src-tauri/cli-bin/oxt
          fi
          ls -la ../src-tauri/cli-bin/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '1' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OxideTerm ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.body || 'See the assets below to download the installer for your platform.' }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  publish-updater:
    name: Generate updater manifest
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const allAssets = release.assets;

            // Map .sig asset name → platform keys
            function mapSigToPlatforms(name) {
              const baseName = name.replace(/\.sig$/, '');
              const keys = [];

              if (name.endsWith('.app.tar.gz.sig')) {
                if (name.includes('x64') || name.includes('x86_64'))
                  keys.push('darwin-x86_64', 'darwin-x86_64-app');
                else if (name.includes('aarch64') || name.includes('arm64'))
                  keys.push('darwin-aarch64', 'darwin-aarch64-app');
              } else if (name.endsWith('.AppImage.sig')) {
                if (name.includes('amd64') || name.includes('x86_64'))
                  keys.push('linux-x86_64', 'linux-x86_64-appimage');
                else if (name.includes('aarch64') || name.includes('arm64'))
                  keys.push('linux-aarch64', 'linux-aarch64-appimage');
              } else if (name.endsWith('.deb.sig')) {
                if (name.includes('amd64') || name.includes('x86_64'))
                  keys.push('linux-x86_64-deb');
                else if (name.includes('aarch64') || name.includes('arm64'))
                  keys.push('linux-aarch64-deb');
              } else if (name.endsWith('.rpm.sig')) {
                if (name.includes('x86_64'))
                  keys.push('linux-x86_64-rpm');
                else if (name.includes('aarch64'))
                  keys.push('linux-aarch64-rpm');
              } else if (name.endsWith('-setup.exe.sig')) {
                if (name.includes('x64') || name.includes('x86_64'))
                  keys.push('windows-x86_64', 'windows-x86_64-nsis');
                else if (name.includes('arm64') || name.includes('aarch64'))
                  keys.push('windows-aarch64', 'windows-aarch64-nsis');
              }

              return { keys, baseName };
            }

            const platforms = {};
            const sigAssets = allAssets.filter(a => a.name.endsWith('.sig'));

            for (const sigAsset of sigAssets) {
              const { keys, baseName } = mapSigToPlatforms(sigAsset.name);
              if (keys.length === 0) continue;

              const binaryAsset = allAssets.find(a => a.name === baseName);
              if (!binaryAsset) {
                console.log(`Warning: no binary asset found for ${baseName}`);
                continue;
              }

              // Download .sig content
              const sigResponse = await fetch(sigAsset.browser_download_url);
              if (!sigResponse.ok) {
                console.log(`Warning: failed to download ${sigAsset.name}`);
                continue;
              }
              const signature = (await sigResponse.text()).trim();
              const url = binaryAsset.browser_download_url;

              for (const key of keys) {
                platforms[key] = { signature, url };
              }
            }

            const latestJson = {
              version,
              notes: release.body || '',
              pub_date: release.published_at || new Date().toISOString(),
              platforms,
            };

            // Delete existing latest.json if present
            const existing = allAssets.find(a => a.name === 'latest.json');
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            // Upload latest.json
            const content = JSON.stringify(latestJson, null, 2);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            console.log(`Uploaded latest.json with ${Object.keys(platforms).length} platform(s):`);
            for (const key of Object.keys(platforms).sort()) {
              console.log(`  ${key}: ${platforms[key].url.split('/').pop()}`);
            }

  cleanup-sigs:
    name: Remove .sig files from release
    needs: publish-updater
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Delete .sig assets from release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            const sigAssets = release.assets.filter(a => a.name.endsWith('.sig'));
            for (const asset of sigAssets) {
              console.log(`Deleting: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
            console.log(`Deleted ${sigAssets.length} .sig file(s).`);

  rename-assets:
    name: Rename release assets
    needs: cleanup-sigs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Rename assets to consistent naming
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            // Unified naming: OxideTerm_{version}_{os}_{arch}.{ext}
            // Arch: x64 (Intel/AMD 64-bit), arm64 (ARM 64-bit)
            const renameRules = [
              // macOS DMG
              { match: /^OxideTerm.*[_-](aarch64|arm64)\.dmg$/i, newName: `OxideTerm_${version}_macos_arm64.dmg` },
              { match: /^OxideTerm.*[_-](x64|x86_64)\.dmg$/i, newName: `OxideTerm_${version}_macos_x64.dmg` },
              // macOS updater (.app.tar.gz)
              { match: /^OxideTerm.*[_-](aarch64|arm64)\.app\.tar\.gz$/i, newName: `OxideTerm_${version}_macos_arm64.app.tar.gz` },
              { match: /^OxideTerm.*[_-](x64|x86_64)\.app\.tar\.gz$/i, newName: `OxideTerm_${version}_macos_x64.app.tar.gz` },
              // Linux .deb
              { match: /^OxideTerm.*[_-](amd64|x86_64|x64)\.deb$/i, newName: `OxideTerm_${version}_linux_x64.deb` },
              { match: /^OxideTerm.*[_-](arm64|aarch64)\.deb$/i, newName: `OxideTerm_${version}_linux_arm64.deb` },
              // Linux .rpm
              { match: /^OxideTerm.*[._-](x86_64|amd64|x64)\.rpm$/i, newName: `OxideTerm_${version}_linux_x64.rpm` },
              { match: /^OxideTerm.*[._-](aarch64|arm64)\.rpm$/i, newName: `OxideTerm_${version}_linux_arm64.rpm` },
              // Linux .AppImage
              { match: /^OxideTerm.*[_-](amd64|x86_64|x64)\.AppImage$/i, newName: `OxideTerm_${version}_linux_x64.AppImage` },
              { match: /^OxideTerm.*[_-](aarch64|arm64)\.AppImage$/i, newName: `OxideTerm_${version}_linux_arm64.AppImage` },
              // Windows NSIS installer
              { match: /^OxideTerm.*[_-](x64|x86_64|amd64)-setup\.exe$/i, newName: `OxideTerm_${version}_windows_x64-setup.exe` },
              { match: /^OxideTerm.*[_-](arm64|aarch64)-setup\.exe$/i, newName: `OxideTerm_${version}_windows_arm64-setup.exe` },
              // Windows NSIS updater (.nsis.zip)
              { match: /^OxideTerm.*[_-](x64|x86_64|amd64)-setup\.nsis\.zip$/i, newName: `OxideTerm_${version}_windows_x64-setup.nsis.zip` },
              { match: /^OxideTerm.*[_-](arm64|aarch64)-setup\.nsis\.zip$/i, newName: `OxideTerm_${version}_windows_arm64-setup.nsis.zip` },
            ];

            const renames = [];
            for (const asset of release.assets) {
              if (asset.name === 'latest.json') continue;
              for (const rule of renameRules) {
                if (rule.match.test(asset.name) && asset.name !== rule.newName) {
                  renames.push({ id: asset.id, oldName: asset.name, newName: rule.newName });
                  break;
                }
              }
            }

            for (const { id, oldName, newName } of renames) {
              console.log(`Renaming: ${oldName} → ${newName}`);
              await github.rest.repos.updateReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: id,
                name: newName,
              });
            }

            // Update latest.json URLs to match renamed assets
            if (renames.length > 0) {
              const latestAsset = release.assets.find(a => a.name === 'latest.json');
              if (latestAsset) {
                const resp = await fetch(latestAsset.browser_download_url);
                const latest = await resp.json();

                for (const platform of Object.values(latest.platforms)) {
                  for (const { oldName, newName } of renames) {
                    if (platform.url && platform.url.includes(oldName)) {
                      platform.url = platform.url.replace(oldName, newName);
                    }
                  }
                }

                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: latestAsset.id,
                });

                const content = JSON.stringify(latest, null, 2);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  name: 'latest.json',
                  data: content,
                  headers: {
                    'content-type': 'application/json',
                    'content-length': Buffer.byteLength(content),
                  },
                });
                console.log('Updated latest.json with renamed URLs');
              }
            }

            console.log(`Renamed ${renames.length} asset(s).`);

  publish-beta-updater:
    name: Publish beta updater manifest
    needs: rename-assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Upload latest.json to updater-beta release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            // Get the latest.json from the current release
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const latestJsonAsset = release.assets.find(a => a.name === 'latest.json');
            if (!latestJsonAsset) {
              console.log('No latest.json found on current release, skipping beta manifest');
              return;
            }

            const resp = await fetch(latestJsonAsset.browser_download_url);
            const content = await resp.text();

            // Create or find the updater-beta release
            let betaRelease;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'updater-beta',
              });
              betaRelease = data;
            } catch (e) {
              if (e.status === 404) {
                // Create the release and the tag
                const { data } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: 'updater-beta',
                  name: 'Beta Updater Manifest',
                  body: 'This release hosts the latest.json for the beta update channel. Do not delete.',
                  prerelease: true,
                  draft: false,
                });
                betaRelease = data;
              } else {
                throw e;
              }
            }

            // Delete existing latest.json on updater-beta release
            const existingAsset = betaRelease.assets.find(a => a.name === 'latest.json');
            if (existingAsset) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existingAsset.id,
              });
            }

            // Upload latest.json to updater-beta release
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: betaRelease.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            console.log(`Uploaded latest.json to updater-beta release for ${tag}`);
